components:
  schemas:
    AppError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
    BackendInfo:
      type: object
      required:
        - backend_type
        - connected
      properties:
        backend_type:
          type: string
        nats_url:
          type: string
        connected:
          type: boolean
    BpmnErrorRequest:
      type: object
      required:
        - workerId
        - errorCode
      properties:
        workerId:
          type: string
        errorCode:
          type: string
    BucketEntry:
      type: object
      required:
        - key
      properties:
        key:
          type: string
        size_bytes:
          type: integer
          format: int64
        revision:
          type: integer
          format: int64
        updated_at:
          type: string
    BucketEntryDetail:
      type: object
      required:
        - key
        - value
      properties:
        key:
          type: string
        value: {}
    CompleteRequest:
      type: object
      properties:
        variables:
          type: object
          additionalProperties: {}
    CompleteServiceTaskRequest:
      type: object
      required:
        - workerId
      properties:
        workerId:
          type: string
        variables:
          type: object
          additionalProperties: {}
    CorrelateMessageRequest:
      type: object
      required:
        - messageName
      properties:
        messageName:
