          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
  /api/instances/{id}:
    get:
      operationId: Api_getInstance
      description: Returns an instance by id. Falls back to the history archive if the instance is no longer active.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessInstance'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
    delete:
      operationId: Api_deleteInstance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
  /api/instances/{id}/files/{var_name}:
    post:
      operationId: Api_uploadInstanceFile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: var_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadFileRequest'
    get:
      operationId: Api_getInstanceFile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: var_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
    delete:
      operationId: Api_deleteInstanceFile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: var_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
