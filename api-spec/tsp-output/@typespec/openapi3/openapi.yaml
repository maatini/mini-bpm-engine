openapi: 3.0.0
info:
  title: bpmninja Engine Server API
  version: 0.0.0
tags: []
paths:
  /api/complete/{id}:
    post:
      operationId: Api_completeTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteRequest'
  /api/definitions:
    get:
      operationId: Api_listDefinitions
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DefinitionInfo'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
  /api/definitions/bpmn/{bpmn_id}:
    delete:
      operationId: Api_deleteAllDefinitions
      description: Delete all versions of a definition by its bpmn_id.
      parameters:
        - name: bpmn_id
          in: path
          required: true
          schema:
            type: string
        - name: cascade
          in: query
          required: false
          schema:
            type: boolean
          explode: false
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
  /api/definitions/{id}:
    delete:
      operationId: Api_deleteDefinition
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: cascade
          in: query
          required: false
          schema:
            type: boolean
          explode: false
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
  /api/definitions/{id}/xml:
    get:
      operationId: Api_getDefinitionXml
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            text/plain:
              schema:
                type: string
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
  /api/deploy:
    post:
      operationId: Api_deploy
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeployResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeployRequest'
  /api/health:
    get:
      operationId: Api_health
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
  /api/history/instances:
    get:
      operationId: Api_listCompletedInstances
      description: Query archived (completed) process instances.
      parameters:
        - name: definition_key
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: business_key
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: from
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: to
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: state
          in: query
          required: false
          description: 'Terminal-state filter: `completed` or `error`.'
          schema:
            type: string
            enum:
              - completed
              - error
          explode: false
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProcessInstance'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppError'
  /api/history/instances/{id}:
    get:
      operationId: Api_getCompletedInstance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessInstance'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
