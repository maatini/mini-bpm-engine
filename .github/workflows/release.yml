name: Release

on:
  push:
    tags:
      - 'v*'               # Trigger bei v0.1.0, v1.2.3 etc.
  workflow_dispatch:       # Für manuelle Tests

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            name: linux
            target: x86_64-unknown-linux-gnu

          # Windows
          - os: windows-latest
            name: windows
            target: x86_64-pc-windows-msvc

          # macOS Apple Silicon (M1/M2/M3/M4) – aktueller Standard
          - os: macos-latest
            name: macos
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: desktop-tauri/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install UI Dependencies
        working-directory: desktop-tauri
        run: npm ci

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop-tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'mini-bpm-desktop ${{ github.ref_name }}'
          releaseDraft: true          # Draft → du kannst noch prüfen & dann publishen
          prerelease: false
          